description: This evaluation folder contains attention scores from test predictions
  and DAG recovery metrics.
files:
  final_scores: Saved attention data (npz files) for fast reloading
  scores_evol.csv: Attention scores evolution over training epochs (CSV)
  dag_metrics.json: Soft Hamming distance comparing learned DAG to true DAG (JSON)
  attention_labels.json: Descriptions of attention blocks and interpretation guide
    (JSON)
column_documentation:
  kfold: Cross-validation fold identifier (k_0, k_1, ...)
  epoch: Training epoch number
  '{block}_{i}{j}_mean': Mean attention from source j to target i (averaged across
    samples)
  '{block}_{i}{j}_diff_mean': Change in attention from initialization
  phi_{block}_{i}{j}: Learned DAG probability for edge j→i
